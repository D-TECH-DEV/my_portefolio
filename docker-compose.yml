version: '3.8'

services:
  app:
    build:
      context: .
    container_name: portfolio_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - main-network
  web:
    image: nginx:alpine
    container_name: portfolio_web
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - main-network

networks:
  main-network:
    external: true
